<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Recuperar contraseña</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <style>
        .forgot-card {
            max-width: 600px;
            width: 90%;
            margin: auto;
        }
        .btn-custom {
            padding: 12px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <section layout:fragment="contenido" class="container-fluid min-vh-100 d-flex align-items-center justify-content-center login-container pt-5 pb-5 mt-2">
        <div class="card shadow p-5 forgot-card">
            <div class="card-body">
                <h1 class="mb-4 text-center">Recuperar Contraseña</h1>
                <p class="text-muted text-center mb-4">
                    Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.
                </p>
                <form th:action="@{/forgot-password}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-4">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email"
                            placeholder="tucorreo@ejemplo.com" required />
                    </div>
                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-dark btn-custom w-100">Enviar Enlace</button>
                        <a th:href="@{/login}" class="btn btn-outline-dark btn-custom w-100">
                            <i class="fas fa-arrow-left me-1"></i> Volver al Login
                        </a>
                    </div>
                    <div class="mt-3 text-center text-danger" th:if="${error}">
                        <span th:text="${error}"></span>
                    </div>
                    <div class="mt-3 text-center text-success" th:if="${mensaje}">
                        <span th:text="${mensaje}"></span>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
