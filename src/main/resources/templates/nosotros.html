<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Nuestros Tutores - Sabor MasterClass</title>
</head>

<body>
    <div layout:fragment="contenido">
        <style>
            :root {
                --gold-accent: #f8c325;
                --dark-card-luxury: rgba(31, 31, 34, 0.85);
                --border-glass: rgba(255, 255, 255, 0.08);
            }

            body {
                background-color: #000 !important;
            }

            .tutores-luxury-wrapper {
                position: relative;
                min-height: 100vh;
                background-image: url('/imagenes/pasta-794464_1280.jpg'); /* Estilo login */
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                padding: 10rem 1rem 6rem;
                margin-top: -80px; 
                margin-left: calc(-50vw + 50%);
                margin-right: calc(-50vw + 50%);
                overflow: hidden;
            }

            .tutores-luxury-overlay {
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%);
                z-index: 1;
            }

            .tutores-container {
                position: relative;
                z-index: 10;
                max-width: 1250px;
                margin: 0 auto;
            }

            .page-title-gold {
                font-family: 'Playfair Display', serif;
                font-weight: 900;
                font-size: 4.5rem;
                letter-spacing: -2px;
                background: linear-gradient(to right, #fff, var(--gold-accent));
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                text-shadow: 0 10px 30px rgba(0,0,0,0.5);
                margin-bottom: 1.5rem;
            }

            .card-tutor-dark {
                background: var(--dark-card-luxury) !important;
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border: 1px solid var(--border-glass) !important;
                border-radius: 35px !important;
                color: #fff !important;
                overflow: hidden;
                transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
                height: 100%;
                box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            }

            .card-tutor-dark:hover {
                transform: translateY(-15px);
                border-color: var(--gold-accent) !important;
                box-shadow: 0 35px 70px rgba(0,0,0,0.8) !important;
            }

            .img-wrapper {
                height: 350px;
                overflow: hidden;
                position: relative;
            }

            .img-wrapper::after {
                content: "";
                position: absolute;
                bottom: 0; left: 0; right: 0;
                height: 60%;
                background: linear-gradient(to top, rgba(15,15,17,1) 0%, transparent 100%);
                z-index: 2;
            }

            .curso-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: top center;
                transition: transform 0.8s ease;
            }

            .card-tutor-dark:hover .curso-img {
                transform: scale(1.1);
            }

            .card-body-tutor {
                position: relative;
                z-index: 10;
                padding: 0 2.5rem 3rem;
                margin-top: -60px;
            }

            .tutor-name {
                font-family: 'Playfair Display', serif;
                font-size: 2rem;
                font-weight: 700;
                margin-bottom: 0.5rem;
                color: #fff;
            }

            .tutor-specialty {
                color: var(--gold-accent);
                font-size: 0.85rem;
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: 2px;
                margin-bottom: 1.5rem;
            }

            .tutor-stats {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 50px;
                padding: 8px 18px;
                display: inline-block;
                font-size: 0.75rem;
                color: #fff;
                margin-bottom: 1.5rem;
                backdrop-filter: blur(5px);
                font-weight: 600;
                letter-spacing: 0.5px;
            }

            .tutor-desc {
                color: rgba(255, 255, 255, 0.6);
                font-size: 0.95rem;
                line-height: 1.7;
                margin-bottom: 0;
            }
        </style>

        <section class="tutores-luxury-wrapper">
            <div class="tutores-luxury-overlay"></div>
            
            <main class="tutores-container animate__animated animate__fadeIn">
                <div class="text-center mb-5 pb-2">
                    <h1 class="page-title-gold mb-3">Conoce a Nuestros Expertos</h1>
                    <p class="text-white-50 fs-5"><i class="fas fa-utensils me-2"></i> Tutores apasionados por la alta cocina compartiendo sus secretos contigo.</p>
                </div>

                <div th:if="${#lists.isEmpty(tutores)}" class="text-center text-white-50 py-5">
                    <p class="fs-5 mb-0">Aún no hay tutores registrados. Vuelve pronto.</p>
                </div>

                <div class="row g-5 justify-content-center" th:if="${!#lists.isEmpty(tutores)}">

                    <div class="col-md-6 col-lg-4" th:each="t : ${tutores}">
                        <div class="card card-tutor-dark">
                            <div class="img-wrapper">
                                <img th:if="${t.imagen != null && !#strings.isEmpty(t.imagen)}" th:src="${t.imagen}"
                                    class="curso-img" th:alt="${t.persona != null ? t.persona.nombre : 'Tutor'}">
                                <img th:unless="${t.imagen != null && !#strings.isEmpty(t.imagen)}" th:src="@{/imagenes/usuario-default.png}"
                                    class="curso-img" th:alt="${t.persona != null ? t.persona.nombre : 'Tutor'}">
                            </div>
                            <div class="card-body-tutor">
                                <h3 class="tutor-name" th:text="${t.persona != null ? t.persona.nombre : 'Tutor'}">Nombre</h3>
                                <p class="tutor-specialty"
                                    th:text="${t.observaciones != null && !#strings.isEmpty(t.observaciones)} ? ${#strings.abbreviate(t.observaciones, 42)} : (${t.experiencia != null && !#strings.isEmpty(t.experiencia)} ? ${#strings.abbreviate(t.experiencia, 42)} : 'Alta cocina')">
                                    Especialidad</p>
                                <div class="tutor-stats"
                                    th:text="|⭐ Tutor · 📚 ${cursosPorTutor.get(t.idTutor)} curso(s)|">
                                    ⭐ Tutor · 📚 0 curso(s)</div>
                                <p class="tutor-desc"
                                    th:text="${t.experiencia != null && !#strings.isEmpty(t.experiencia)} ? ${t.experiencia} : (${t.observaciones != null && !#strings.isEmpty(t.observaciones)} ? ${t.observaciones} : 'Experto en gastronomía y técnicas de alta cocina.')">
                                    Descripción</p>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </section>
    </div>
</body>
</html>
