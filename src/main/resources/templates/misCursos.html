<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security" layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8" />
    <title layout:fragment="titulo">Mis Cursos - Sabor MasterClass</title>
    <!-- CSS Específico de Mis Cursos -->
    <link rel="stylesheet" th:href="@{/css/misCursos.css}">
</head>

<body>
    <main layout:fragment="contenido" class="mis-cursos-section">
        <div class="container">
            
            <!-- Header Sección Premium -->
            <div class="section-header animate__animated animate__fadeInDown">
                <h1 class="display-4 fw-bold mb-2" 
                    th:text="${esTutor != null and esTutor ? 'Cursos que Impartes' : 'Tu Ruta Culinaria'}">
                    Mis Cursos
                </h1>
                <p class="text-white-50 lead">Explora tus lecciones activas, materiales exclusivos y el progreso hacia tu maestría.</p>
            </div>

            <!-- Empty State Luxury -->
            <div th:if="${#lists.isEmpty(inscripciones)}" class="empty-state shadow-lg animate__animated animate__zoomIn">
                <div class="mb-4">
                    <i class="fas fa-utensils fa-5x text-gold opacity-50"></i>
                </div>
                <h3 class="fw-bold text-white mb-3">¡Vaya! Aún no hay cursos aquí</h3>
                <p class="text-white-50 mb-4 mx-auto" style="max-width: 500px;"
                   th:text="${esTutor != null and esTutor ? 'Aún no tienes cursos asociados como tutor. Contacta a un administrador para asignarte uno.' : 'Parece que aún no has comenzado tu viaje. ¡Descubre nuestro catálogo de alta cocina!'}">
                   Explora el catálogo y empieza tu viaje.
                </p>
                <a th:href="@{/cursos}" class="btn btn-premium px-5 py-3 rounded-pill fw-bold" th:if="${esTutor == null or !esTutor}">
                    <i class="fas fa-layer-group me-2"></i>Descubrir Cursos
                </a>
            </div>

            <!-- Grid de Cursos MasterClass -->
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-5" th:if="${!#lists.isEmpty(inscripciones)}">
                <div class="col" th:each="inscripcion, iter : ${inscripciones}">
                    <div class="course-card-premium h-100 shadow-lg animate__animated animate__fadeInUp" 
                         th:style="'animation-delay: ' + ${iter.index * 0.1} + 's'">
                        
                        <!-- Imagen y Estado -->
                        <div class="course-img-wrapper">
                            <span class="course-status-badge" th:text="${inscripcion.estado.nombre}">Estado</span>
                            <img th:src="${inscripcion.curso.imagen != null ? ( #strings.contains(inscripcion.curso.imagen, 'http') ? inscripcion.curso.imagen : '/imagenes/' + inscripcion.curso.imagen ) : '/imagenes/reposteria_francesa.jpg'}" 
                                class="course-img" alt="Vista del curso">
                        </div>

                        <!-- Info MasterClass -->
                        <div class="course-body d-flex flex-column">
                            <h3 class="course-title" th:text="${inscripcion.curso.nombre}">Nombre del Curso</h3>
                            <p class="course-desc" th:text="${inscripcion.curso.detalle}">Detalle del curso...</p>
                            
                            <div class="mt-auto pt-4 border-top border-white border-opacity-10">
                                <a th:href="@{'/cursos/' + ${inscripcion.curso.id}}" class="btn-premium-action">
                                    <i th:class="${esTutor != null and esTutor ? 'fas fa-tools' : 'fas fa-bolt'}"></i>
                                    <span th:text="${esTutor != null and esTutor ? 'Gestionar Módulos' : 'Continuar Aprendizaje'}">Ver Curso</span>
                                </a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </main>
74: </body>

</html>
