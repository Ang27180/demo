<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/css/auth-pages.css}" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <style>
        .error {
            color: red;
            font-size: 0.8rem;
            display: block;
            margin: 4px 0 8px 0;
        }
    </style>
</head>

<body>
    <section layout:fragment="contenido" class="container-fluid px-0 login-container auth-page-shell">
        <div class="row g-0 auth-page-row login-container">
            <div class="col-12 col-md-6 auth-form-col auth-form-col--center">
                <div class="card shadow p-4 auth-card">
                    <div class="card-body">
                        <h1 class="mb-4 text-center">Iniciar Sesión</h1>

                        <form th:action="@{/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="curso" th:if="${cursoInscripcionId != null}"
                                th:value="${cursoInscripcionId}">
                            <div class="mb-3">
                                <label for="username" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="username" name="username"
                                    autocomplete="username" placeholder="Ingresa tu correo" required />
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" name="password"
                                    autocomplete="current-password" placeholder="Ingresa tu contraseña" required />
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Ingresar</button>
                            <div class="mt-4 d-flex flex-wrap justify-content-center gap-2">
                                <a th:href="@{/registro}" class="btn btn-outline-secondary flex-fill px-1"
                                    style="font-size: 0.85rem;">¿No tienes cuenta? Regístrate</a>
                                <a th:href="@{/forgot-password}" class="btn btn-outline-warning flex-fill px-1"
                                    style="font-size: 0.85rem;">Olvidé mi contraseña</a>
                                <a th:href="@{/home}" class="btn btn-outline-primary flex-fill px-1"
                                    style="font-size: 0.85rem;">Volver al Home</a>
                            </div>
                            <div class="mt-3 text-center text-danger" th:if="${param.error}">
                                Usuario o contraseña incorrectos.
                            </div>
                            <div class="mt-3 text-center text-success" th:if="${param.logout}">
                                Sesión cerrada correctamente.
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 d-none d-md-flex auth-image-col">
                <img th:src="@{/imagenes/pasta-794464_1280.jpg}" alt="Pasta">
            </div>
        </div>
    </section>
</body>

</html>
