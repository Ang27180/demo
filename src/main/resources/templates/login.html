<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Iniciar Sesión — Sabor MasterClass</title>
    <!-- Estilos específicos para el Login que complementan Home.css -->
    <style>
        body {
            background-color: #111 !important; /* Forces dark edges just in case */
        }

        .login-luxury-wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('/imagenes/pasta-794464_1280.jpg');
            background-size: cover;
            background-position: center;
            padding: 2rem;
            margin-top: -80px; /* Compensa el padding-top del body en Home.css */
            /* Break out of container constraints */
            margin-left: calc(-50vw + 50%);
            margin-right: calc(-50vw + 50%);
        }

        .login-luxury-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.95));
            z-index: 0;
        }

        .login-card-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
        }

        .card-elegant-dark {
            background-color: var(--dark-card) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 1.5rem !important;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5) !important;
            color: #fff !important;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .login-logo-circle {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border: 3px solid var(--yellow-accent);
            padding: 2px;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(248, 195, 37, 0.3);
        }

        .font-serif-italic {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            color: var(--yellow-accent);
        }

        .input-group-text-dark {
            background-color: #121212 !important;
            border: 1px solid #333 !important;
            color: var(--yellow-accent) !important;
            border-right: none !important;
            border-radius: 0.75rem 0 0 0.75rem !important;
        }

        .input-dark-field {
            background-color: #121212 !important;
            border: 1px solid #333 !important;
            color: #fff !important;
            border-left: none !important;
            border-radius: 0 0.75rem 0.75rem 0 !important;
            padding: 12px 15px !important;
        }

        .input-dark-field:focus {
            border-color: var(--yellow-accent) !important;
            box-shadow: none !important;
        }

        .input-group:focus-within .input-group-text-dark {
            border-color: var(--yellow-accent) !important;
        }

        .form-label-gold {
            color: var(--yellow-accent);
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        .btn-gold-pill {
            background-color: var(--yellow-accent) !important;
            color: #000 !important;
            font-weight: 700 !important;
            border-radius: 50px !important;
            padding: 14px !important;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-gold-pill:hover {
            background-color: #e0ac10 !important;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(248, 195, 37, 0.3) !important;
        }

        .helper-link-pill {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #ffffff !important; /* Más blanco para mejor legibilidad */
            border-radius: 50px !important;
            padding: 8px 16px !important;
            font-size: 0.8rem !important;
            transition: all 0.2s;
            text-decoration: none;
            font-weight: 500;
        }

        .helper-link-pill:hover {
            background-color: rgba(248, 195, 37, 0.1) !important;
            border-color: var(--yellow-accent) !important;
            color: var(--yellow-accent) !important;
        }

        /* Ajuste del footer para coincidir en color y altura (80px) con el navbar superior */
        footer.fixed-bottom { 
            background-color: #212529 !important;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            height: 80px; /* Igual que .navbar-lg en Home.css */
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <section layout:fragment="contenido" class="login-luxury-wrapper">
        <div class="login-luxury-overlay"></div>
        
        <div class="login-card-container animate__animated animate__fadeInUp">
            <div class="card card-elegant-dark">
                <div class="card-body p-4 p-md-5">
                    
                    <!-- Logo y Branding -->
                    <div class="text-center mb-4">
                        <img th:src="@{/imagenes/logo-sabor1.jpg}" class="rounded-circle login-logo-circle mb-3" alt="Logo">
                        <h1 class="h3 fw-bold mb-1 font-serif">Iniciar Sesión</h1>
                        <p class="text-white-50 small">Ingresa a <span class="font-serif-italic">Sabor MasterClass</span></p>
                    </div>
                    
                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        
                        <!-- Campo Usuario -->
                        <div class="mb-4">
                            <label for="username" class="form-label form-label-gold">USUARIO O EMAIL</label>
                            <div class="input-group">
                                <span class="input-group-text input-group-text-dark">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input type="email" class="form-control input-dark-field" id="username" name="username" 
                                       placeholder="nombre@ejemplo.com" required autocomplete="username">
                            </div>
                        </div>

                        <!-- Campo Contraseña -->
                        <div class="mb-5">
                            <label for="password" class="form-label form-label-gold">CONTRASEÑA</label>
                            <div class="input-group">
                                <span class="input-group-text input-group-text-dark">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control input-dark-field" id="password" name="password" 
                                       placeholder="••••••••" required autocomplete="current-password">
                            </div>
                        </div>

                        <!-- Botón Principal -->
                        <button type="submit" class="btn btn-gold-pill w-100 shadow-sm mb-4">
                            INGRESAR <i class="fas fa-chevron-right ms-2 small"></i>
                        </button>

                        <!-- Enlaces de Ayuda -->
                        <div class="d-flex flex-wrap justify-content-center gap-2 pt-3 border-top border-secondary border-opacity-25">
                            <a th:href="@{/registro}" class="helper-link-pill">Registrarme</a>
                            <a th:href="@{/forgot-password}" class="helper-link-pill">Olvidé mi clave</a>
                            <a th:href="@{/}" class="helper-link-pill"><i class="fas fa-home me-1"></i>Inicio</a>
                        </div>
                        
                        <!-- Mensaje de Error -->
                        <div class="mt-4 text-center text-danger animate__animated animate__shakeX" th:if="${param.error}">
                            <div class="bg-danger bg-opacity-10 py-2 px-3 rounded-3 small">
                                <i class="fas fa-exclamation-circle me-2"></i> Credenciales incorrectas.
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Texto inferior opcional -->
            <p class="text-center text-white-50 mt-4 small">
                &copy; 2024 Sabor MasterClass. Pasión por la alta cocina.
            </p>
        </div>
    </section>
</body>
</html>
