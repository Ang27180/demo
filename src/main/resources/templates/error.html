<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Error | Sabor MasterClass</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root { --gold: #f8c325; --dark-bg: #0a0a0b; --card: rgba(31, 31, 34, 0.95); }
    body {
      min-height: 100vh;
      margin: 0;
      background: var(--dark-bg);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 1rem 2rem;
    }
    .error-panel {
      max-width: 560px;
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    }
    .error-panel h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 1rem; color: #f8c325; }
    .btn-gold {
      background: var(--gold);
      color: #000 !important;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      padding: 0.6rem 1.25rem;
    }
    .btn-gold:hover { background: #d8a61c; color: #000 !important; }
  </style>
</head>
<body>
  <div class="error-panel">
    <p class="text-white-50 small mb-2"><i class="fas fa-triangle-exclamation me-1"></i> Algo salió mal</p>
    <h1 th:text="${error != null} ? ${error} : 'Ha ocurrido un error'">Error</h1>
    <p class="mb-1 text-white-50 small" th:if="${status != null}">
      Código HTTP: <span class="text-white" th:text="${status}">500</span>
    </p>
    <p class="mb-3" th:if="${message != null and !#strings.isEmpty(message)}" th:text="${message}">Detalle</p>
    <p class="small text-white-50 mb-3" th:if="${path != null}" th:text="'Ruta: ' + ${path}"></p>
    <p class="small text-secondary mb-4">
      Si ves error de SQL con <code>acudiente</code> y el log muestra <code>com.poryectojpa</code>, estás ejecutando el proyecto equivocado:
      usa la carpeta <strong class="text-white-50">demo1</strong> y <code>mvn clean spring-boot:run</code>.
    </p>
    <a th:href="@{/home}" class="btn btn-gold">Volver al inicio</a>
  </div>
</body>
</html>
