<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Recibo de pago</title>
    <link rel="stylesheet" th:href="@{/css/misCursos.css}">
</head>

<body>
    <main layout:fragment="contenido" class="mis-cursos-section pt-5 pb-5">
        <div class="container mt-5">
            <a th:if="${esAcudiente}" th:href="@{/acudiente/panel}" class="btn btn-outline-light btn-sm mb-4 rounded-pill">
                <i class="fas fa-arrow-left me-1"></i> Panel acudiente
            </a>
            <a th:unless="${esAcudiente}" th:href="@{/mis-cursos}" class="btn btn-outline-light btn-sm mb-4 rounded-pill">
                <i class="fas fa-arrow-left me-1"></i> Mis cursos
            </a>

            <div class="section-header">
                <h1 class="display-5 fw-bold text-white mb-2">Recibo de pago</h1>
                <p class="text-white-50 mb-0">
                    Curso: <strong class="text-warning" th:text="${recibo.inscripcion.curso.nombre}">—</strong>
                </p>
            </div>

            <div th:if="${msgRecibo}" class="alert alert-success border-0 shadow-sm" th:text="${msgRecibo}"></div>

            <div class="card bg-dark border-secondary text-white mb-4 mx-auto" style="max-width: 560px;">
                <div class="card-body p-4">
                    <p class="mb-2"><span class="text-white-50">Estudiante:</span>
                        <span th:text="${recibo.inscripcion.estudiante.persona.nombre}">—</span></p>
                    <p class="mb-2"><span class="text-white-50">Medio:</span>
                        <span th:text="${recibo.medioPago.nombre}">—</span>
                        (<span th:text="${recibo.medioPago.tipo}">QR</span>)</p>
                    <p class="mb-2"><span class="text-white-50">Fecha emisión:</span>
                        <span th:text="${recibo.fechaEmision}">—</span></p>
                    <p class="mb-2"><span class="text-white-50">Estado:</span>
                        <span class="badge" th:classappend="${recibo.estado == 'PAGADO'} ? ' bg-success' : ' bg-warning text-dark'"
                            th:text="${recibo.estado}">PENDIENTE</span></p>
                    <p class="mb-3"><span class="text-white-50">Referencia:</span>
                        <code class="text-warning" th:text="${recibo.codigoQrUnico}">REC-</code></p>

                    <div class="text-center my-4">
                        <img th:src="'data:image/png;base64,' + ${qrPngBase64}" alt="QR" class="img-fluid border rounded p-2 bg-white"
                            style="max-width: 220px;">
                    </div>

                    <p class="small text-white-50 mb-4">
                        El QR codifica la referencia del recibo. Tras confirmar el pago, un administrador activará la inscripción.
                    </p>

                    <div class="d-flex flex-wrap gap-2">
                        <a th:href="@{/reportes/recibo/pdf/{id}(id=${recibo.id})}"
                            class="btn btn-warning fw-bold rounded-pill">
                            <i class="fas fa-file-pdf me-1"></i> Descargar PDF
                        </a>
                        <a th:if="${esAcudiente}" th:href="@{/acudiente/panel}" class="btn btn-outline-light rounded-pill">
                            Volver al panel
                        </a>
                        <a th:unless="${esAcudiente}" th:href="@{/mis-cursos}" class="btn btn-outline-light rounded-pill">
                            Volver a Mis cursos
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
