<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Generar recibo</title>
</head>

<body>
    <main layout:fragment="contenido" class="container mt-5 pt-4">
        <h2 class="mb-4">Generar recibo (administrador)</h2>
        <p class="text-muted">Solo aparecen inscripciones en estado <strong>PENDIENTE_PAGO</strong> sin recibo previo.</p>

        <div th:if="${inscripciones == null or inscripciones.isEmpty()}" class="alert alert-info">
            No hay inscripciones pendientes de pago sin recibo. Puede revisar el listado general en
            <a th:href="@{/admin/recibos}">Recibos</a>.
        </div>

        <form th:if="${inscripciones != null and !inscripciones.isEmpty()}" th:action="@{/admin/recibos/generar}" method="post" class="card card-body shadow-sm" style="max-width: 36rem;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label" for="idInscripcion">Inscripción</label>
                <select class="form-select" id="idInscripcion" name="idInscripcion" required>
                    <option value="" disabled selected>Seleccione…</option>
                    <option th:each="i : ${inscripciones}" th:value="${i.id}"
                        th:text="|#${i.id} — ${i.estudiante.persona.nombre} — ${i.curso.nombre}|">
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" for="idMedioPago">Medio de pago</label>
                <select class="form-select" id="idMedioPago" name="idMedioPago" required>
                    <option value="" disabled selected>Seleccione…</option>
                    <option th:each="m : ${medios}" th:value="${m.id}" th:text="${m.nombre}">Nequi</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Generar recibo</button>
        </form>

        <a th:href="@{/admin/recibos}" class="btn btn-outline-secondary mt-3">Volver a recibos</a>
    </main>
</body>

</html>
