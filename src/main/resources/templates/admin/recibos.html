<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Recibos</title>
</head>

<body>
    <main layout:fragment="contenido" class="container mt-5 pt-4">
        <h2 class="mb-4">Recibos</h2>
        <div th:if="${msgAdmin}" class="alert alert-success" th:text="${msgAdmin}"></div>
        <div th:if="${errorAdmin}" class="alert alert-danger" th:text="${errorAdmin}"></div>

        <div class="table-responsive">
            <table class="table table-sm table-striped align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Inscripción</th>
                        <th>Curso</th>
                        <th>Medio</th>
                        <th>Fecha</th>
                        <th>Estado recibo</th>
                        <th>Código QR</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${recibos}">
                        <td th:text="${r.id}">1</td>
                        <td th:text="${r.inscripcion.id}">1</td>
                        <td th:text="${r.inscripcion.curso.nombre}">Curso</td>
                        <td th:text="${r.medioPago.nombre}">Nequi</td>
                        <td th:text="${r.fechaEmision}">2025-01-01</td>
                        <td th:text="${r.estado}">PENDIENTE</td>
                        <td><small th:text="${r.codigoQrUnico}">REC-</small></td>
                        <td>
                            <form th:if="${r.estado == 'PENDIENTE'}" th:action="@{/admin/recibos/{id}/marcar-pagado(id=${r.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-success">Marcar pagado</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <a th:href="@{/admin}" class="btn btn-outline-secondary mt-3">Volver al panel</a>
    </main>
</body>

</html>
