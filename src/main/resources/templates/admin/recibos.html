<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Recibos</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div layout:fragment="contenido" class="admin-panel-page pt-5 pb-5">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                <div>
                    <h1 class="h2 fw-bold mb-1">Recibos</h1>
                    <p class="text-muted mb-0">Listado de recibos generados; marca como pagado cuando el pago esté confirmado.</p>
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <a th:href="@{/admin/recibos/generar}" class="btn btn-yellow-action btn-sm rounded-pill">
                        <i class="fas fa-plus me-1"></i> Generar recibo
                    </a>
                    <a th:href="@{/admin}" class="btn btn-outline-light btn-sm rounded-pill">
                        <i class="fas fa-arrow-left me-1"></i> Panel admin
                    </a>
                </div>
            </div>

            <div th:if="${msgAdmin}" class="alert alert-success border-0 shadow-sm" th:text="${msgAdmin}"></div>
            <div th:if="${errorAdmin}" class="alert alert-danger border-0 shadow-sm" th:text="${errorAdmin}"></div>

            <div class="card tutor-card border-0 rounded-4 shadow-sm overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-admin table-sm table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Inscripción</th>
                                <th>Curso</th>
                                <th>Medio</th>
                                <th>Fecha</th>
                                <th>Estado recibo</th>
                                <th>Código QR</th>
                                <th class="text-end"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${recibos}">
                                <td th:text="${r.id}">1</td>
                                <td th:text="${r.inscripcion.id}">1</td>
                                <td th:text="${r.inscripcion.curso.nombre}">Curso</td>
                                <td th:text="${r.medioPago.nombre}">Nequi</td>
                                <td th:text="${r.fechaEmision}">2025-01-01</td>
                                <td>
                                    <span class="badge rounded-pill"
                                        th:classappend="${r.estado == 'PAGADO'} ? ' bg-success' : ' bg-warning text-dark'"
                                        th:text="${r.estado}">PENDIENTE</span>
                                </td>
                                <td><small class="text-warning font-monospace" th:text="${r.codigoQrUnico}">REC-</small></td>
                                <td class="text-end">
                                    <form th:if="${r.estado == 'PENDIENTE'}"
                                        th:action="@{/admin/recibos/{id}/marcar-pagado(id=${r.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-success rounded-pill">Marcar pagado</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <a th:href="@{/admin}" class="btn btn-outline-light mt-4 rounded-pill">
                <i class="fas fa-arrow-left me-1"></i> Volver al panel
            </a>
        </div>
    </div>
</body>

</html>
