<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title layout:fragment="titulo">Mis cursos a cargo</title>
</head>
<body>
    <div layout:fragment="contenido" class="container mt-5 pt-5 pb-5">
        <h2 class="mb-4">Mis cursos a cargo</h2>
        <p class="text-muted" th:if="${#lists.isEmpty(cursos)}">No tienes cursos asignados. Un administrador debe vincular tu perfil tutor a cada curso.</p>
        <div class="list-group" th:if="${!#lists.isEmpty(cursos)}">
            <div th:each="c : ${cursos}" class="list-group-item d-flex flex-wrap justify-content-between align-items-center gap-2">
                <span class="fw-medium" th:text="${c.nombre}">Curso</span>
                <div class="d-flex flex-wrap gap-2">
                    <a th:href="@{/tutor/panel/cursos/{id}/alumnos(id=${c.id})}" class="btn btn-sm btn-primary rounded-pill">
                        Ver alumnos
                    </a>
                    <a th:href="@{/admin/cursos/{id}/contenido(id=${c.id})}" class="btn btn-sm btn-info text-white rounded-pill">
                        Gestionar contenido
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
