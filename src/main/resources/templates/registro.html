<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title layout:fragment="titulo">Registro - Sabor MasterClass</title>
  <link rel="stylesheet" th:href="@{/css/registro.css}">
  <style>
    .error {
      color: red;
      font-size: 0.8rem;
      margin: 4px 0 8px 0;
      display: block;
    }
  </style>
</head>

<body>
  <section layout:fragment="contenido" class="container-fluid px-0 registro-container auth-page-shell">
    <div class="row g-0 auth-page-row login-container registro-container">
      <div class="col-12 col-md-6 auth-form-col">
        <div class="card shadow p-4 auth-card">
          <div class="card-body">
            <h1 class="mb-4 text-center">Regístrate</h1>
            <form th:action="@{/registro}" th:object="${persona}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <div class="mb-3">
                <select class="form-control" th:field="*{tipoDocumento}" required>
                  <option value="">Seleccione tipo de documento</option>
                  <option value="CC">Cédula de Ciudadanía</option>
                  <option value="TI">Tarjeta de Identidad</option>
                  <option value="CE">Cédula de Extranjería</option>
                </select>
                <span th:if="${#fields.hasErrors('tipoDocumento')}" th:errors="*{tipoDocumento}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{documento}" class="form-control" placeholder="Número de documento"
                  pattern="\d+" title="El documento deben ser solo números" minlength="5" required>
                <span th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}" class="error"></span>
              </div>
              <div class="mb-3">
                <select class="form-control" th:field="*{genero}" required>
                  <option value="">Seleccione género</option>
                  <option value="Femenino">Femenino</option>
                  <option value="Masculino">Masculino</option>
                  <option value="Otro">Otro</option>
                </select>
                <span th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Digite su nombre"
                  maxlength="30" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+" title="Solo letras" required />
                <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{direccion}" class="form-control" placeholder="Dirección" required />
                <span th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{telefono}" class="form-control" placeholder="Teléfono (7 a 10 dígitos)"
                  pattern="\d{7,10}" required>
                <span th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="email" th:field="*{email}" class="form-control" placeholder="Ingrese su correo" required>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
                <span th:if="${errorCorreo}" th:text="${errorCorreo}" class="error"></span>
              </div>
              <div class="mb-3 position-relative">
                <input type="password" th:field="*{contrasena}" class="form-control" id="contrasena"
                  placeholder="Contraseña" required />
                <i class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-3"
                  onclick="mostrarContrasena('contrasena', this)"></i>
                <span th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}" class="error"></span>
              </div>
              <div class="mb-3 position-relative">
                <input type="password" th:field="*{confirmarContrasena}" class="form-control" id="confirmar"
                  placeholder="Confirme su contraseña" required />
                <i class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-3"
                  onclick="mostrarContrasena('confirmar', this)"></i>
                <span th:if="${#fields.hasErrors('confirmarContrasena')}" th:errors="*{confirmarContrasena}" class="error"></span>
                <span th:if="${errorContrasena}" th:text="${errorContrasena}" class="error"></span>
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" th:field="*{aceptaTerminos}" required />
                <label class="form-check-label">Acepto términos y condiciones</label>
                <span th:if="${errorTerminos}" th:text="${errorTerminos}" class="error"></span>
              </div>
               <div id="seccionTutor" class="mt-4 p-3 border rounded bg-light mb-3" style="display: none;">
                <h6 class="fw-bold mb-3"><i class="fa-solid fa-user-shield me-2"></i>Datos del acudiente (Requerido para TI)</h6>
                <span th:if="${errorTutor}" th:text="${errorTutor}" class="error mb-2"></span>
                <div class="row g-2">
                  <div class="col-md-6 mb-2">
                    <select class="form-control form-control-sm" th:field="*{tutorTipoDocumento}" id="tutorTipoDoc">
                      <option value="">Tipo Documento Acudiente</option>
                      <option value="CC">Cédula de Ciudadanía</option>
                      <option value="CE">Cédula de Extranjería</option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-2">
                    <input type="text" th:field="*{tutorDocumento}" class="form-control form-control-sm" 
                      placeholder="Documento Acudiente" id="tutorDoc" pattern="\d+" title="Solo números" minlength="5">
                  </div>
                </div>
                <div class="row g-2">
                  <div class="col-md-6 mb-2">
                    <select class="form-control form-control-sm" th:field="*{tutorGenero}" id="tutorGen">
                      <option value="">Género Acudiente</option>
                      <option value="Femenino">Femenino</option>
                      <option value="Masculino">Masculino</option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-2">
                    <select class="form-control form-control-sm" th:field="*{tutorAutorizacion}" id="tutorAut">
                      <option value="">Parentesco / Autorización</option>
                      <option value="MADRE">MADRE</option>
                      <option value="PADRE">PADRE</option>
                      <option value="OTRO">OTRO</option>
                    </select>
                  </div>
                </div>
                <div class="mb-2">
                  <input type="text" th:field="*{tutorNombre}" class="form-control form-control-sm" 
                    placeholder="Nombre completo acudiente" id="tutorNom" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+" title="Solo letras">
                </div>
                <div class="mb-2">
                  <input type="text" th:field="*{tutorDireccion}" class="form-control form-control-sm" placeholder="Dirección acudiente" id="tutorDir">
                </div>
                <div class="row g-2">
                  <div class="col-md-6 mb-2">
                    <input type="text" th:field="*{tutorTelefono}" class="form-control form-control-sm" 
                      placeholder="Teléfono acudiente" id="tutorTel" pattern="\d{7,10}" title="De 7 a 10 números">
                  </div>
                  <div class="col-md-6 mb-2">
                    <input type="email" th:field="*{tutorEmail}" class="form-control form-control-sm" placeholder="Email acudiente" id="tutorEma">
                  </div>
                </div>
              </div>

              <button type="submit" class="btn btn-dark w-100">Crear Cuenta</button>
              <div class="mt-3 text-center">
                <a th:href="@{/login}" class="btn btn-outline-secondary me-2">Volver al Login</a>
                <a th:href="@{/home}" class="btn btn-outline-primary">Volver al Home</a>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-6 d-none d-md-flex auth-image-col">
        <img th:src="@{/imagenes/pasta-794464_1280.jpg}" alt="">
      </div>
    </div>
    <script>
      // Control de visibilidad de la sección de acudiente
      const selectTipoDoc = document.querySelector('select[name="tipoDocumento"]');
      const seccionTutor = document.getElementById('seccionTutor');
      const inputsTutor = seccionTutor.querySelectorAll('input, select');

      function toggleTutor() {
        if (selectTipoDoc.value === "TI") {
          seccionTutor.style.display = "block";
          inputsTutor.forEach(input => input.setAttribute('required', 'true'));
        } else {
          seccionTutor.style.display = "none";
          inputsTutor.forEach(input => {
            input.removeAttribute('required');
            limpiarErrorRealTime(input);
          });
        }
      }

      selectTipoDoc.addEventListener('change', toggleTutor);
      window.addEventListener('load', toggleTutor); 

      // --- VALIDACIONES EN TIEMPO REAL ---
      window.addEventListener('DOMContentLoaded', () => {
        const formInputs = document.querySelectorAll('.form-control, .form-check-input');
        formInputs.forEach(input => {
          input.addEventListener('input', () => validarCampoRealTime(input));
          input.addEventListener('blur', () => validarCampoRealTime(input));
        });
      });

      function validarCampoRealTime(input) {
        let mensaje = "";
        if (!input.checkValidity()) {
          if (input.validity.valueMissing) {
            mensaje = "Este campo es obligatorio";
          } else if (input.validity.patternMismatch) {
            mensaje = input.title || "Formato incorrecto";
          } else if (input.validity.typeMismatch) {
            mensaje = "Ingrese un formato válido (ej: correo@ejemplo.com)";
          } else if (input.validity.tooShort) {
             mensaje = `Mínimo ${input.minLength} caracteres`;
          }
        }
        mostrarErrorRealTime(input, mensaje);
      }

      function mostrarErrorRealTime(input, mensaje) {
        let spanError = input.parentNode.querySelector('.error-realtime');
        if (!spanError) {
          spanError = document.createElement('span');
          spanError.className = 'error error-realtime';
          input.parentNode.appendChild(spanError);
        }
        spanError.textContent = mensaje;
        if (mensaje) {
          input.classList.add('is-invalid');
          input.style.borderColor = "#ff0000";
        } else {
          input.classList.remove('is-invalid');
          input.style.borderColor = "";
        }
      }

      function limpiarErrorRealTime(input) {
        const spanError = input.parentNode.querySelector('.error-realtime');
        if (spanError) spanError.textContent = "";
        input.classList.remove('is-invalid');
        input.style.borderColor = "";
      }

      function mostrarContrasena(idCampo, icono) {
        const input = document.getElementById(idCampo);
        if (input.type === "password") {
          input.type = "text";
          icono.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icono.classList.replace("fa-eye-slash", "fa-eye");
        }
      }
    </script>
  </section>
</body>

</html>
