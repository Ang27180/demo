<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title layout:fragment="titulo">Registro - Sabor MasterClass</title>
  <link rel="stylesheet" th:href="@{/css/registro.css}">
  <style>
    .error {
      color: red;
      font-size: 0.8rem;
      margin: 4px 0 8px 0;
      display: block;
    }
    .live-registro-msg:empty { display: none; }
    .live-registro-msg { min-height: 1.1rem; margin-top: 0.25rem; }
  </style>
</head>

<body>
  <section layout:fragment="contenido" class="container-fluid px-0 registro-container auth-page-shell">
    <div class="row g-0 auth-page-row login-container registro-container">
      <div class="col-12 col-md-6 auth-form-col">
        <div class="card shadow p-4 auth-card">
          <div class="card-body">
            <h1 class="mb-4 text-center">Regístrate</h1>
            <form th:action="@{/registro}" th:object="${persona}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <div class="mb-3">
                <select class="form-control" th:field="*{tipoDocumento}" data-live-registro="select" required>
                  <option value="">Seleccione tipo de documento</option>
                  <option value="CC">Cédula de Ciudadanía</option>
                  <option value="TI">Tarjeta de Identidad</option>
                  <option value="CE">Cédula de Extranjería</option>
                </select>
                <span th:if="${#fields.hasErrors('tipoDocumento')}" th:errors="*{tipoDocumento}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{documento}" class="form-control" placeholder="Número de documento"
                  inputmode="numeric" maxlength="20" data-live-registro="documento" title="Solo números, mínimo 5 dígitos" required>
                <span th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}" class="error"></span>
              </div>
              <div class="mb-3">
                <select class="form-control" th:field="*{genero}" data-live-registro="select" required>
                  <option value="">Seleccione género</option>
                  <option value="Femenino">Femenino</option>
                  <option value="Masculino">Masculino</option>
                  <option value="Otro">Otro</option>
                </select>
                <span th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Digite su nombre"
                  maxlength="100" data-live-registro="nombre" title="Solo letras y espacios" required />
                <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{direccion}" class="form-control" placeholder="Dirección" data-live-registro="direccion" required />
                <span th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{telefono}" class="form-control" placeholder="Teléfono (10 dígitos, inicia con 3)"
                  inputmode="numeric" maxlength="10" data-live-registro="telefono" required>
                <span th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}" class="error"></span>
              </div>
              <div class="mb-3">
                <input type="text" th:field="*{email}" class="form-control" placeholder="Ingrese su correo" inputmode="email" data-live-registro="email" required>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
                <span th:if="${errorCorreo}" th:text="${errorCorreo}" class="error"></span>
              </div>
              <div class="mb-3 position-relative">
                <input type="password" th:field="*{contrasena}" class="form-control" id="contrasena"
                  placeholder="Contraseña" data-live-registro="contrasena" required />
                <i class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-3"
                  onclick="mostrarContrasena('contrasena', this)"></i>
                <span th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}" class="error"></span>
              </div>
              <div class="mb-3 position-relative">
                <input type="password" th:field="*{confirmarContrasena}" class="form-control" id="confirmar"
                  placeholder="Confirme su contraseña" data-live-registro="confirmar" required />
                <i class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-3"
                  onclick="mostrarContrasena('confirmar', this)"></i>
                <span th:if="${#fields.hasErrors('confirmarContrasena')}" th:errors="*{confirmarContrasena}" class="error"></span>
                <span th:if="${errorContrasena}" th:text="${errorContrasena}" class="error"></span>
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" th:field="*{aceptaTerminos}" required />
                <label class="form-check-label">Acepto términos y condiciones</label>
                <span th:if="${errorTerminos}" th:text="${errorTerminos}" class="error"></span>
              </div>
               <div id="seccionTutor" class="mt-4 p-3 border rounded bg-light mb-3" style="display: none;">
                <h6 class="fw-bold mb-3"><i class="fa-solid fa-user-shield me-2"></i>Datos del acudiente (Requerido para TI)</h6>
                <span th:if="${errorTutor}" th:text="${errorTutor}" class="error mb-2"></span>
                <div class="row g-2">
                  <div class="col-md-6 mb-2">
                    <select class="form-control form-control-sm" th:field="*{tutorTipoDocumento}" id="tutorTipoDoc" data-live-registro="tutorSelect">
                      <option value="">Tipo Documento Acudiente</option>
                      <option value="CC">Cédula de Ciudadanía</option>
                      <option value="CE">Cédula de Extranjería</option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-2">
                    <input type="text" th:field="*{tutorDocumento}" class="form-control form-control-sm" 
                      placeholder="Documento Acudiente" id="tutorDoc" maxlength="20" data-live-registro="tutorDocumento" title="Solo números, mín. 5">
                  </div>
                </div>
                <div class="row g-2">
                  <div class="col-md-6 mb-2">
                    <select class="form-control form-control-sm" th:field="*{tutorGenero}" id="tutorGen" data-live-registro="tutorSelect">
                      <option value="">Género Acudiente</option>
                      <option value="Femenino">Femenino</option>
                      <option value="Masculino">Masculino</option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-2">
                    <select class="form-control form-control-sm" th:field="*{tutorAutorizacion}" id="tutorAut" data-live-registro="tutorSelect">
                      <option value="">Parentesco / Autorización</option>
                      <option value="MADRE">MADRE</option>
                      <option value="PADRE">PADRE</option>
                      <option value="OTRO">OTRO</option>
                    </select>
                  </div>
                </div>
                <div class="mb-2">
                  <input type="text" th:field="*{tutorNombre}" class="form-control form-control-sm" 
                    placeholder="Nombre completo acudiente" id="tutorNom" data-live-registro="tutorNombre" title="Solo letras">
                </div>
                <div class="mb-2">
                  <input type="text" th:field="*{tutorDireccion}" class="form-control form-control-sm" placeholder="Dirección acudiente" id="tutorDir" data-live-registro="tutorDireccion">
                </div>
                <div class="row g-2">
                  <div class="col-md-6 mb-2">
                    <input type="text" th:field="*{tutorTelefono}" class="form-control form-control-sm" 
                      placeholder="Teléfono acudiente" id="tutorTel" maxlength="10" data-live-registro="tutorTelefono" title="7 a 10 dígitos">
                  </div>
                  <div class="col-md-6 mb-2">
                    <input type="text" th:field="*{tutorEmail}" class="form-control form-control-sm" placeholder="Email acudiente" id="tutorEma" data-live-registro="tutorEmail">
                  </div>
                </div>
              </div>

              <button type="submit" class="btn btn-dark w-100">Crear Cuenta</button>
              <div class="mt-3 text-center">
                <a th:href="@{/login}" class="btn btn-outline-secondary me-2">Volver al Login</a>
                <a th:href="@{/home}" class="btn btn-outline-primary">Volver al Home</a>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-6 d-none d-md-flex auth-image-col">
        <img th:src="@{/imagenes/pasta-794464_1280.jpg}" alt="">
      </div>
    </div>
    <script>
      const RE_EMAIL = /^[\w.%+-]+@(gmail\.com|hotmail\.com|hotmail\.es|outlook\.com|yahoo\.com|yahoo\.es|live\.com|icloud\.com|proton\.me)$/i;
      const RE_NOMBRE = /^[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s]+$/;
      const RE_DIR = /^[a-zA-Z0-9áéíóúÁÉÍÓÚñÑüÜ#.,\-\s]+$/;

      const selectTipoDoc = document.querySelector('select[name="tipoDocumento"]');
      const seccionTutor = document.getElementById('seccionTutor');
      const inputsTutor = seccionTutor.querySelectorAll('input, select');

      function tutorVisible() {
        return selectTipoDoc && selectTipoDoc.value === 'TI';
      }

      function getLiveMsgEl(input) {
        var p = input.closest('.mb-3, .mb-2');
        if (!p) return null;
        var el = p.querySelector('.live-registro-msg');
        if (!el) {
          el = document.createElement('div');
          el.className = 'form-text small live-registro-msg';
          el.setAttribute('aria-live', 'polite');
          input.after(el);
        }
        return el;
      }

      function setRegistroLive(input, state, msg) {
        if (input.classList && input.classList.contains('form-check-input')) return;
        var hint = getLiveMsgEl(input);
        input.classList.remove('is-valid', 'is-invalid');
        input.style.borderColor = '';
        if (state === 'valid') {
          input.classList.add('is-valid');
          if (hint) { hint.textContent = msg || 'Correcto'; hint.className = 'form-text small live-registro-msg text-success'; }
        } else if (state === 'invalid') {
          input.classList.add('is-invalid');
          input.style.borderColor = '#dc3545';
          if (hint) { hint.textContent = msg || 'Revise este campo'; hint.className = 'form-text small live-registro-msg text-danger'; }
        } else {
          if (hint) { hint.textContent = ''; hint.className = 'form-text small live-registro-msg'; }
        }
      }

      function validarConfirmar() {
        var c1 = document.getElementById('contrasena');
        var c2 = document.getElementById('confirmar');
        if (!c1 || !c2 || !c2.value) { setRegistroLive(c2, 'neutral'); return; }
        if (c1.value !== c2.value) setRegistroLive(c2, 'invalid', 'Las contraseñas no coinciden.');
        else setRegistroLive(c2, 'valid', 'Las contraseñas coinciden.');
      }

      function runLiveRegistro(input) {
        var kind = input.getAttribute('data-live-registro');
        if (!kind) return;
        if (seccionTutor && seccionTutor.contains(input) && !tutorVisible()) {
          setRegistroLive(input, 'neutral');
          return;
        }

        var v = (input.value || '').trim();
        var name = input.name || '';

        if (kind === 'select' || kind === 'tutorSelect') {
          if (!input.value) setRegistroLive(input, 'neutral');
          else setRegistroLive(input, 'valid', 'Selección correcta.');
          return;
        }

        if (kind === 'documento') {
          if (!v) { setRegistroLive(input, 'neutral'); return; }
          if (!/^\d+$/.test(v)) { setRegistroLive(input, 'invalid', 'Solo números (sin letras ni símbolos).'); return; }
          if (v.length < 5) { setRegistroLive(input, 'invalid', 'Mínimo 5 dígitos.'); return; }
          setRegistroLive(input, 'valid', 'Documento válido.');
          return;
        }

        if (kind === 'nombre' || kind === 'tutorNombre') {
          if (!v) { setRegistroLive(input, 'neutral'); return; }
          if (!RE_NOMBRE.test(v)) { setRegistroLive(input, 'invalid', 'Solo letras y espacios (tildes y ñ permitidos).'); return; }
          setRegistroLive(input, 'valid', 'Nombre válido.');
          return;
        }

        if (kind === 'direccion' || kind === 'tutorDireccion') {
          if (!v) { setRegistroLive(input, 'neutral'); return; }
          if (!RE_DIR.test(v)) { setRegistroLive(input, 'invalid', 'Use letras, números, espacios y # . , -'); return; }
          setRegistroLive(input, 'valid', 'Dirección válida.');
          return;
        }

        if (kind === 'telefono') {
          v = (input.value || '').replace(/\D/g, '');
          input.value = v.slice(0, 10);
          v = input.value;
          if (!v) { setRegistroLive(input, 'neutral'); return; }
          if (!/^\d+$/.test(v)) { setRegistroLive(input, 'invalid', 'Solo números.'); return; }
          if (v[0] !== '3') { setRegistroLive(input, 'invalid', 'Debe empezar con 3.'); return; }
          if (v.length < 10) { setRegistroLive(input, 'invalid', 'Complete 10 dígitos.'); return; }
          setRegistroLive(input, 'valid', 'Teléfono completo.');
          return;
        }

        if (kind === 'tutorTelefono') {
          v = (input.value || '').replace(/\D/g, '');
          input.value = v.slice(0, 10);
          v = input.value;
          if (!v) { setRegistroLive(input, 'neutral'); return; }
          if (v.length < 7 || v.length > 10) { setRegistroLive(input, 'invalid', 'Entre 7 y 10 dígitos.'); return; }
          setRegistroLive(input, 'valid', 'Teléfono válido.');
          return;
        }

        if (kind === 'email' || kind === 'tutorEmail') {
          var t = (input.value || '').trim().toLowerCase();
          input.value = t;
          if (!t) { setRegistroLive(input, 'neutral'); return; }
          if (t.indexOf('@') < 0) { setRegistroLive(input, 'invalid', 'El correo debe incluir @.'); return; }
          if (!RE_EMAIL.test(t)) { setRegistroLive(input, 'invalid', 'Dominio no permitido (Gmail, Hotmail, Outlook, Yahoo, etc.).'); return; }
          setRegistroLive(input, 'valid', 'Correo aceptado.');
          return;
        }

        if (kind === 'contrasena') {
          if (!v) { setRegistroLive(input, 'neutral'); validarConfirmar(); return; }
          if (v.length < 8) { setRegistroLive(input, 'invalid', 'Mínimo 8 caracteres.'); validarConfirmar(); return; }
          if (!/[A-Z]/.test(v)) { setRegistroLive(input, 'invalid', 'Incluya una mayúscula.'); validarConfirmar(); return; }
          if (!/[0-9]/.test(v)) { setRegistroLive(input, 'invalid', 'Incluya un número.'); validarConfirmar(); return; }
          if (!/[^a-zA-Z0-9\s]/.test(v)) { setRegistroLive(input, 'invalid', 'Incluya un carácter especial (! @ # …).'); validarConfirmar(); return; }
          setRegistroLive(input, 'valid', 'Contraseña cumple los requisitos.');
          validarConfirmar();
          return;
        }

        if (kind === 'confirmar') {
          validarConfirmar();
          return;
        }

        if (kind === 'tutorDocumento') {
          if (!v) { setRegistroLive(input, 'neutral'); return; }
          if (!/^\d+$/.test(v)) { setRegistroLive(input, 'invalid', 'Solo números.'); return; }
          if (v.length < 5) { setRegistroLive(input, 'invalid', 'Mínimo 5 dígitos.'); return; }
          setRegistroLive(input, 'valid', 'Documento válido.');
          return;
        }
      }

      function toggleTutor() {
        if (selectTipoDoc.value === "TI") {
          seccionTutor.style.display = "block";
          inputsTutor.forEach(function (inp) { inp.setAttribute('required', 'true'); });
        } else {
          seccionTutor.style.display = "none";
          inputsTutor.forEach(function (inp) {
            inp.removeAttribute('required');
            setRegistroLive(inp, 'neutral');
          });
        }
      }

      selectTipoDoc.addEventListener('change', toggleTutor);
      window.addEventListener('load', toggleTutor);

      window.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('[data-live-registro]').forEach(function (input) {
          input.addEventListener('input', function () { runLiveRegistro(input); });
          input.addEventListener('change', function () { runLiveRegistro(input); });
          input.addEventListener('blur', function () { runLiveRegistro(input); });
        });
        var docIn = document.querySelector('input[name="documento"]');
        if (docIn) docIn.addEventListener('input', function () {
          this.value = this.value.replace(/\D/g, '').slice(0, 20);
        });
        var tutorDoc = document.getElementById('tutorDoc');
        if (tutorDoc) tutorDoc.addEventListener('input', function () {
          this.value = this.value.replace(/\D/g, '').slice(0, 20);
        });
      });

      function mostrarContrasena(idCampo, icono) {
        const input = document.getElementById(idCampo);
        if (input.type === "password") {
          input.type = "text";
          icono.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icono.classList.replace("fa-eye-slash", "fa-eye");
        }
      }
    </script>
  </section>
</body>

</html>
