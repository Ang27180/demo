<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title layout:fragment="titulo">Lista de Personas</title>
</head>
<body>
    <div layout:fragment="contenido" class="container mt-5">
        <h1 class="mb-4 text-center">Lista de Personas</h1>

        <div class="mb-3 d-flex justify-content-between">
            <a th:href="@{/admin}" class="btn btn-secondary">⬅️ Volver al Panel Admin</a>
            <a th:href="@{/personas/nueva}" class="btn btn-success">➕ Nueva Persona</a>
        </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Documento</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Estado cuenta (estudiante)</th>
                <th class="text-center">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="persona : ${personas}">
                <td th:text="${persona.id}"></td>
                <td th:text="${persona.documento}"></td>
                <td th:text="${persona.nombre}"></td>
                <td th:text="${persona.email}"></td>
                <td>
                    <span th:if="${persona.rolId != 2}">—</span>
                    <span th:if="${persona.rolId == 2 && persona.estudiante != null && persona.estudiante.estadoEstudiante != null}"
                        th:text="${persona.estudiante.estadoEstudiante.codigo}">ACTIVO</span>
                    <span th:if="${persona.rolId == 2 && (persona.estudiante == null || persona.estudiante.estadoEstudiante == null)}">—</span>
                </td>
                <td class="text-center">
                    <a th:href="@{/personas/editar/{id}(id=${persona.id})}" class="btn btn-primary btn-sm">✏️ Editar</a>
                    <form th:if="${persona.rolId == 2}" th:action="@{/personas/{id}/toggle-estado-cuenta(id=${persona.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-warning btn-sm">Activar / Desactivar</button>
                    </form>
                    <a th:href="@{/personas/eliminar/{id}(id=${persona.id})}"
                       onclick="return confirm('¿Seguro que deseas eliminar esta persona?')"
                       class="btn btn-danger btn-sm">🗑️ Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    </div>
</body>
</html>
