<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}" />
  <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}" />
  <title layout:fragment="titulo">Sabor MasterClass</title>

  <!-- Bootstrap + FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" th:href="@{/css/Home.css}" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 navbar-lg fixed-top shadow-sm">
    <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
      <img th:src="@{/imagenes/logo-sabor1.jpg}" height="70" class="me-2 rounded-circle" />
      <span class="fs-4 fw-semibold">SaborMasterClass</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav me-3">
        <li class="nav-item"><a th:href="@{/}" class="nav-link">Inicio</a></li>
        <li class="nav-item"><a th:href="@{/nuestros-tutores}" class="nav-link">Nuestros Tutores</a></li>
        <li class="nav-item">
          <a th:href="@{/cursos}" class="nav-link">Cursos</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('TUTOR')">
          <a th:href="@{/tutor/panel/cursos}" class="nav-link"><i class="fas fa-chalkboard-teacher me-1"></i>Mis cursos (tutor)</a>
        </li>
        <!-- Nuevo enlace solo para estudiantes -->
        <li class="nav-item" sec:authorize="hasRole('ESTUDIANTE')">
          <a th:href="@{/mis-cursos}" class="nav-link">
            Mis Cursos
          </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ESTUDIANTE')">
          <a th:href="@{/acudiente}" class="nav-link">Acudiente</a>
        </li>
        <li class="nav-item"><a th:href="@{/contacto}" class="nav-link">Contacto</a></li>
        <!-- Solo visible para ADMIN -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a th:href="@{/admin}" class="nav-link text-white fw-bold">
            <i class="fa-solid fa-gear"></i> Panel Admin
          </a>
        </li>
      </ul>

      <!-- Usuario NO autenticado -->
      <div sec:authorize="!isAuthenticated()">
        <a th:href="@{/login}" class="btn btn-outline-light me-2">Login</a>
        <a th:href="@{/registro}" class="btn btn-light">Registro</a>
      </div>

      <!-- Usuario autenticado -->
      <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
        <span class="text-white me-3">
          <!-- El nombre de usuario es ahora un enlace al perfil personal /perfil -->
          👋 Bienvenido, <a th:href="@{/perfil}" class="text-white text-decoration-none fw-bold"
            sec:authentication="name" title="Ver mi perfil"></a>
        </span>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn btn-outline-light">Cerrar sesión</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- Contenido dinámico -->
  <main class="container" layout:fragment="contenido">
    <!-- Aquí se inyecta el contenido de cada vista -->
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-center fixed-bottom">
    <div class="container d-flex flex-column justify-content-center align-items-center py-3">
      <div class="d-flex gap-4 mb-2">
        <i class="fab fa-whatsapp text-white fs-4"></i>
        <i class="fab fa-facebook text-white fs-4"></i>
        <i class="fab fa-x-twitter text-white fs-4"></i>
        <i class="fab fa-instagram text-white fs-4"></i>
        <i class="fab fa-youtube text-white fs-4"></i>
        <i class="fab fa-tiktok text-white fs-4"></i>
      </div>
      <p class="text-white mb-0 small">SaborMasterClass. Todos los derechos reservados. Desarrollado por HAMN</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
