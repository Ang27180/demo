<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title layout:fragment="titulo">Correo masivo por curso</title>
</head>
<body>
    <div layout:fragment="contenido" class="container mt-5 pt-5 pb-5">
        <h2 class="mb-4">Correo a estudiantes inscritos en un curso</h2>
        <p class="text-muted">Se envía un correo HTML a cada correo de persona asociado a las inscripciones del curso.</p>
        <div th:if="${errorCorreo}" class="alert alert-danger" th:text="${errorCorreo}"></div>
        <form th:action="@{/admin/correo-curso/enviar}" method="post" class="card p-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label">Curso</label>
                <select name="idCurso" class="form-select" required>
                    <option th:each="c : ${cursos}" th:value="${c.id}" th:text="${c.nombre}">Curso</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Asunto</label>
                <input type="text" name="asunto" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea name="cuerpo" class="form-control" rows="6" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
            <a th:href="@{/admin}" class="btn btn-outline-secondary ms-2">Volver</a>
        </form>
    </div>
</body>
</html>
