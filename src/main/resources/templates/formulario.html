<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title layout:fragment="titulo" th:text="${persona.id == null} ? 'Nueva Persona' : 'Editar Persona'"></title>
</head>
<body>
    <div layout:fragment="contenido" class="container mt-5 form-persona-page">
        <style>
            .live-field-msg:empty { display: none; }
            .live-field-msg { min-height: 1.25rem; }
            .form-persona-page {
                padding-bottom: 2rem;
                margin-bottom: 1rem;
            }
        </style>
        <h1 class="mb-4" th:text="${persona.id == null} ? 'Nueva Persona' : 'Editar Persona'"></h1>

        <form id="formPersona" th:attr="data-edit-mode=${persona.id != null}"
              th:action="@{${persona.id == null} ? '/personas' : '/personas/' + ${persona.id}}" th:object="${persona}" method="post" class="row g-3" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="col-md-6">
                <label class="form-label" for="documento">Documento</label>
                <input type="text" id="documento" th:field="*{documento}" class="form-control"
                       inputmode="numeric" autocomplete="off" maxlength="20"
                       data-live="documento" required />
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}"></div>
                <div class="form-text small live-field-msg" id="live-documento" aria-live="polite"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="tipoDocumento">Tipo de documento</label>
                <select id="tipoDocumento" th:field="*{tipoDocumento}" class="form-select" data-live="select" required>
                    <option value="">Seleccione…</option>
                    <option value="CC">Cédula de ciudadanía</option>
                    <option value="TI">Tarjeta de identidad</option>
                    <option value="CE">Cédula de extranjería</option>
                </select>
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('tipoDocumento')}" th:errors="*{tipoDocumento}"></div>
                <div class="form-text small live-field-msg" id="live-tipoDocumento" aria-live="polite"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="genero">Género</label>
                <select id="genero" th:field="*{genero}" class="form-select" data-live="select" required>
                    <option value="">Seleccione…</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Masculino">Masculino</option>
                </select>
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></div>
                <div class="form-text small live-field-msg" id="live-genero" aria-live="polite"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}" class="form-control" data-live="nombre" required />
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                <div class="form-text small live-field-msg" id="live-nombre" aria-live="polite"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="email">Correo</label>
                <input type="text" id="email" th:field="*{email}" class="form-control"
                       placeholder="usuario@dominio.com" inputmode="email" autocomplete="email" data-live="email" required />
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                <div class="form-text small live-field-msg" id="live-email" aria-live="polite"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="direccion">Dirección</label>
                <input type="text" id="direccion" th:field="*{direccion}" class="form-control" data-live="direccion" required />
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>
                <div class="form-text small live-field-msg" id="live-direccion" aria-live="polite"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="telefono">Teléfono</label>
                <input type="text" id="telefono" th:field="*{telefono}" class="form-control"
                       inputmode="numeric" maxlength="10" data-live="telefono" required />
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                <div class="form-text small live-field-msg" id="live-telefono" aria-live="polite"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="rolId">Rol</label>
                <select id="rolId" th:field="*{rolId}" class="form-select" data-live="select" required>
                    <option value="">Seleccione…</option>
                    <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.nombreVisible}"></option>
                </select>
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('rolId')}" th:errors="*{rolId}"></div>
                <div class="form-text small live-field-msg" id="live-rolId" aria-live="polite"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="contrasena">Contraseña</label>
                <div class="position-relative">
                    <input type="password" id="contrasena" th:field="*{contrasena}" class="form-control pe-5" autocomplete="new-password"
                           th:required="${persona.id == null}"
                           data-live="contrasena" />
                    <button type="button" class="btn btn-link position-absolute top-50 end-0 translate-middle-y py-0 px-2 text-secondary border-0"
                            onclick="mostrarContrasenaPersona(this)" title="Mostrar u ocultar contraseña" aria-label="Mostrar u ocultar contraseña">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>
                <p class="form-text small mb-0" th:if="${persona.id != null}">Deje vacío para mantener la contraseña actual.</p>
                <div class="invalid-feedback d-block text-danger small" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}"></div>
                <div class="form-text small live-field-msg" id="live-contrasena" aria-live="polite"></div>
            </div>

            <th:block th:if="${persona.id == null}">
                <div id="seccionTutor" class="col-12 mt-2 p-3 border rounded bg-light" style="display: none;">
                    <h6 class="fw-bold mb-2"><i class="fa-solid fa-user-shield me-2"></i>Datos del acudiente <span class="text-muted fw-normal">(obligatorio con Tarjeta de identidad)</span></h6>
                    <p class="small text-muted mb-3">El rol del menor debe ser <strong>Estudiante</strong> para crear la vinculación legal en el sistema (igual que en el registro público).</p>
                    <div th:if="${errorTutor}" class="alert alert-danger py-2 small" th:text="${errorTutor}"></div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="tutorTipoDoc">Tipo documento acudiente</label>
                            <select id="tutorTipoDoc" th:field="*{tutorTipoDocumento}" class="form-select" data-live="select">
                                <option value="">Seleccione…</option>
                                <option value="CC">Cédula de ciudadanía</option>
                                <option value="CE">Cédula de extranjería</option>
                            </select>
                            <div class="form-text small live-field-msg" id="live-tutorTipoDoc" aria-live="polite"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="tutorDoc">Documento acudiente</label>
                            <input type="text" id="tutorDoc" th:field="*{tutorDocumento}" class="form-control" inputmode="numeric" maxlength="20" data-live="tutorDoc" autocomplete="off" />
                            <div class="form-text small live-field-msg" id="live-tutorDoc" aria-live="polite"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="tutorGen">Género acudiente</label>
                            <select id="tutorGen" th:field="*{tutorGenero}" class="form-select" data-live="select">
                                <option value="">Seleccione…</option>
                                <option value="Femenino">Femenino</option>
                                <option value="Masculino">Masculino</option>
                            </select>
                            <div class="form-text small live-field-msg" id="live-tutorGen" aria-live="polite"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="tutorAut">Parentesco / autorización</label>
                            <select id="tutorAut" th:field="*{tutorAutorizacion}" class="form-select" data-live="select">
                                <option value="">Seleccione…</option>
                                <option value="MADRE">MADRE</option>
                                <option value="PADRE">PADRE</option>
                                <option value="OTRO">OTRO</option>
                            </select>
                            <div class="form-text small live-field-msg" id="live-tutorAut" aria-live="polite"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="tutorNom">Nombre completo acudiente</label>
                            <input type="text" id="tutorNom" th:field="*{tutorNombre}" class="form-control" data-live="tutorNombre" />
                            <div class="form-text small live-field-msg" id="live-tutorNom" aria-live="polite"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="tutorDir">Dirección acudiente</label>
                            <input type="text" id="tutorDir" th:field="*{tutorDireccion}" class="form-control" data-live="tutorDir" />
                            <div class="form-text small live-field-msg" id="live-tutorDir" aria-live="polite"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="tutorTel">Teléfono acudiente</label>
                            <input type="text" id="tutorTel" th:field="*{tutorTelefono}" class="form-control" inputmode="numeric" maxlength="10" data-live="tutorTel" />
                            <div class="form-text small live-field-msg" id="live-tutorTel" aria-live="polite"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="tutorEma">Correo acudiente</label>
                            <input type="text" id="tutorEma" th:field="*{tutorEmail}" class="form-control" inputmode="email" data-live="tutorEmail" />
                            <div class="form-text small live-field-msg" id="live-tutorEma" aria-live="polite"></div>
                        </div>
                    </div>
                </div>
            </th:block>

            <div class="col-12">
                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/personas}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>

        <script th:inline="none">
(function () {
    const form = document.getElementById('formPersona');
    if (!form) return;
    const editMode = form.getAttribute('data-edit-mode') === 'true';

    const RE_EMAIL = /^[\w.%+-]+@(gmail\.com|hotmail\.com|hotmail\.es|outlook\.com|yahoo\.com|yahoo\.es|live\.com|icloud\.com|proton\.me)$/i;
    const RE_NOMBRE = /^[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s]+$/;
    const RE_DIR = /^[a-zA-Z0-9áéíóúÁÉÍÓÚñÑüÜ#.,\-\s]+$/;

    function setLiveState(input, state, msg) {
        const id = input.id;
        const hint = id ? document.getElementById('live-' + id) : null;
        input.classList.remove('is-valid', 'is-invalid');
        if (state === 'valid') {
            input.classList.add('is-valid');
            if (hint) { hint.textContent = msg || 'Válido'; hint.className = 'form-text small live-field-msg text-success'; }
        } else if (state === 'invalid') {
            input.classList.add('is-invalid');
            if (hint) { hint.textContent = msg || 'Revise este campo'; hint.className = 'form-text small live-field-msg text-danger'; }
        } else {
            if (hint) { hint.textContent = ''; hint.className = 'form-text small live-field-msg'; }
        }
    }

    function validateDocumento(v) {
        if (!v) return { state: 'neutral', msg: '' };
        if (!/^\d+$/.test(v)) return { state: 'invalid', msg: 'Solo se permiten números (sin letras ni símbolos).' };
        if (v.length < 5) return { state: 'invalid', msg: 'Debe tener al menos 5 dígitos.' };
        return { state: 'valid', msg: 'Documento válido.' };
    }

    function validateNombre(v) {
        if (!v) return { state: 'neutral', msg: '' };
        if (!RE_NOMBRE.test(v)) return { state: 'invalid', msg: 'Solo letras y espacios (incluye tildes y ñ).' };
        if (v.trim().length < 2) return { state: 'invalid', msg: 'Mínimo 2 caracteres.' };
        return { state: 'valid', msg: 'Nombre válido.' };
    }

    function validateEmail(v) {
        const t = (v || '').trim().toLowerCase();
        if (!t) return { state: 'neutral', msg: '' };
        if (!t.includes('@')) return { state: 'invalid', msg: 'El correo debe incluir @.' };
        if (!RE_EMAIL.test(t)) return { state: 'invalid', msg: 'Use un dominio permitido (Gmail, Hotmail, Outlook, Yahoo, Live, iCloud, Proton).' };
        return { state: 'valid', msg: 'Formato de correo aceptado.' };
    }

    function validateDireccion(v) {
        if (!v) return { state: 'neutral', msg: '' };
        if (!RE_DIR.test(v)) return { state: 'invalid', msg: 'Solo letras, números, espacios y # . , -' };
        return { state: 'valid', msg: 'Dirección válida.' };
    }

    function validateTelefono(v) {
        if (!v) return { state: 'neutral', msg: '' };
        if (!/^\d+$/.test(v)) return { state: 'invalid', msg: 'Solo números.' };
        if (v.length > 0 && v[0] !== '3') return { state: 'invalid', msg: 'El teléfono debe empezar con 3.' };
        if (v.length > 0 && v.length < 10) return { state: 'invalid', msg: 'Faltan dígitos (10 en total).' };
        if (v.length > 10) return { state: 'invalid', msg: 'Máximo 10 dígitos.' };
        if (v.length === 10) return { state: 'valid', msg: 'Teléfono completo.' };
        return { state: 'neutral', msg: '' };
    }

    function validateTutorTelefono(v) {
        if (!v) return { state: 'neutral', msg: '' };
        if (!/^\d+$/.test(v)) return { state: 'invalid', msg: 'Solo números.' };
        if (v.length < 7 || v.length > 10) return { state: 'invalid', msg: 'Entre 7 y 10 dígitos.' };
        return { state: 'valid', msg: 'Teléfono válido.' };
    }

    function validateTutorEmail(v) {
        const t = (v || '').trim().toLowerCase();
        if (!t) return { state: 'neutral', msg: '' };
        if (!t.includes('@')) return { state: 'invalid', msg: 'El correo debe incluir @.' };
        if (!RE_EMAIL.test(t)) return { state: 'invalid', msg: 'Dominio no permitido (Gmail, Hotmail, Outlook, etc.).' };
        return { state: 'valid', msg: 'Correo aceptado.' };
    }

    function validateContrasena(v) {
        if (editMode && (!v || !v.trim())) return { state: 'neutral', msg: '' };
        if (!v) return { state: 'neutral', msg: '' };
        if (v.length < 8) return { state: 'invalid', msg: 'Mínimo 8 caracteres.' };
        if (!/[A-Z]/.test(v)) return { state: 'invalid', msg: 'Incluya al menos una mayúscula.' };
        if (!/[0-9]/.test(v)) return { state: 'invalid', msg: 'Incluya al menos un número.' };
        if (!/[^a-zA-Z0-9\s]/.test(v)) return { state: 'invalid', msg: 'Incluya un carácter especial (ej. ! @ #).' };
        return { state: 'valid', msg: 'Contraseña cumple los requisitos.' };
    }

    function validateSelect(input) {
        const ok = input.value && input.value !== '';
        if (!ok) return { state: 'neutral', msg: '' };
        return { state: 'valid', msg: 'Selección correcta.' };
    }

    function runLive(input) {
        const kind = input.getAttribute('data-live');
        if (!kind) return;
        let r;
        if (kind === 'select') r = validateSelect(input);
        else if (kind === 'documento') r = validateDocumento(input.value.trim());
        else if (kind === 'nombre') r = validateNombre(input.value);
        else if (kind === 'email') r = validateEmail(input.value);
        else if (kind === 'direccion') r = validateDireccion(input.value);
        else if (kind === 'telefono') r = validateTelefono(input.value.trim());
        else if (kind === 'contrasena') r = validateContrasena(input.value);
        else if (kind === 'tutorDoc') r = validateDocumento(input.value.trim());
        else if (kind === 'tutorNombre') r = validateNombre(input.value);
        else if (kind === 'tutorDir') r = validateDireccion(input.value);
        else if (kind === 'tutorTel') r = validateTutorTelefono(input.value.trim());
        else if (kind === 'tutorEmail') r = validateTutorEmail(input.value);
        else return;
        setLiveState(input, r.state, r.msg);
    }

    function toggleTutorSection() {
        const seccion = document.getElementById('seccionTutor');
        const tipo = document.getElementById('tipoDocumento');
        if (!seccion || !tipo) return;
        const ti = tipo.value === 'TI';
        seccion.style.display = ti ? 'block' : 'none';
        seccion.querySelectorAll('input, select').forEach(function (el) {
            if (ti) {
                el.setAttribute('required', 'required');
            } else {
                el.removeAttribute('required');
                setLiveState(el, 'neutral', '');
            }
        });
    }

    form.querySelectorAll('[data-live]').forEach(function (el) {
        el.addEventListener('input', function () { runLive(el); });
        el.addEventListener('change', function () { runLive(el); });
        el.addEventListener('blur', function () { runLive(el); });
    });

    const tipoDocumentoSelect = document.getElementById('tipoDocumento');
    if (tipoDocumentoSelect) {
        tipoDocumentoSelect.addEventListener('change', toggleTutorSection);
    }

    document.getElementById('telefono')?.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
    });
    document.getElementById('documento')?.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 20);
    });
    document.getElementById('tutorDoc')?.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 20);
    });
    document.getElementById('tutorTel')?.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
    });

    form.addEventListener('submit', function (e) {
        let hasError = false;
        const tiActivo = tipoDocumentoSelect && tipoDocumentoSelect.value === 'TI';
        form.querySelectorAll('[data-live]').forEach(function (el) {
            if (el.closest('#seccionTutor') && !tiActivo) {
                return;
            }
            var empty = (el.tagName === 'SELECT') ? !el.value : !String(el.value || '').trim();
            if (el.hasAttribute('required') && empty) {
                if (el.id === 'contrasena' && editMode) {
                    setLiveState(el, 'neutral', '');
                    return;
                }
                setLiveState(el, 'invalid', 'Este campo es obligatorio.');
                hasError = true;
                return;
            }
            runLive(el);
            if (el.classList.contains('is-invalid')) hasError = true;
        });
        if (hasError) {
            e.preventDefault();
            var first = form.querySelector('.is-invalid');
            if (first) first.focus();
        }
    });

    window.addEventListener('load', function () {
        toggleTutorSection();
        form.querySelectorAll('[data-live]').forEach(function (el) {
            if (el.value) runLive(el);
        });
    });
})();

window.mostrarContrasenaPersona = function (btn) {
    var input = document.getElementById('contrasena');
    if (!input) return;
    var icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        if (icon) icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        if (icon) icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
};
        </script>
    </div>
</body>
</html>
