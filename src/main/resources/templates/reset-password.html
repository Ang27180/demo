<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Nueva contraseña</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <style>
        .live-reset-msg:empty {
            display: none;
        }

        .live-reset-msg {
            min-height: 1.1rem;
            margin-top: 0.25rem;
        }

        .toggle-password-eye {
            cursor: pointer;
            color: #555;
            z-index: 5;
        }

        .toggle-password-eye:focus {
            outline: 2px solid #6619f5;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <section layout:fragment="contenido"
        class="container-fluid min-vh-100 d-flex align-items-center justify-content-center login-container pt-5 pb-5 mt-2">
        <div class="card shadow p-5" style="max-width: 520px; width: 90%;">
            <div class="card-body">
                <h1 class="mb-3 text-center h3">Establecer nueva contraseña</h1>
                <p class="text-muted text-center small mb-2">
                    Introduce y confirma tu nueva contraseña.
                </p>
                <p class="text-muted small text-center mb-4">
                    Mismos requisitos que en el registro: mínimo <strong>8</strong> caracteres, una
                    <strong>mayúscula</strong>, un <strong>número</strong> y un <strong>carácter especial</strong>
                    (por ejemplo ! @ #).
                </p>
                <div class="alert alert-danger py-2 small" th:if="${errorForm}" th:text="${errorForm}"></div>
                <form id="formResetPassword" th:action="@{/reset}" method="post" class="d-grid gap-3" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="token" th:value="${token}" />
                    <div>
                        <label for="password" class="form-label">Nueva contraseña</label>
                        <div class="position-relative">
                            <input type="password" class="form-control pe-5" id="password" name="password"
                                autocomplete="new-password" minlength="8" required data-live-reset="contrasena"
                                title="Mínimo 8 caracteres, mayúscula, número y carácter especial" />
                            <span role="button" tabindex="0" class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle-password-eye"
                                title="Mostrar u ocultar contraseña" aria-label="Mostrar u ocultar contraseña"
                                data-toggle-for="password"></span>
                        </div>
                    </div>
                    <div>
                        <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                        <div class="position-relative">
                            <input type="password" class="form-control pe-5" id="confirmPassword" name="confirmPassword"
                                autocomplete="new-password" minlength="8" required data-live-reset="confirmar"
                                title="Debe coincidir con la nueva contraseña" />
                            <span role="button" tabindex="0" class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle-password-eye"
                                title="Mostrar u ocultar contraseña" aria-label="Mostrar u ocultar contraseña"
                                data-toggle-for="confirmPassword"></span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-dark">Guardar contraseña</button>
                    <a th:href="@{/login}" class="btn btn-outline-secondary">Volver al inicio de sesión</a>
                </form>
            </div>
        </div>
        <script>
            (function () {
                var MSG_POLITICA = 'Mínimo 8 caracteres, una mayúscula, un número y un carácter especial';

                function getLiveMsgEl(input) {
                    var wrap = input.closest('.position-relative');
                    if (!wrap || !wrap.parentElement) return null;
                    var p = wrap.parentElement;
                    var el = p.querySelector('.live-reset-msg');
                    if (!el) {
                        el = document.createElement('div');
                        el.className = 'form-text small live-reset-msg';
                        el.setAttribute('aria-live', 'polite');
                        p.appendChild(el);
                    }
                    return el;
                }

                function setLive(input, state, msg) {
                    var hint = getLiveMsgEl(input);
                    input.classList.remove('is-valid', 'is-invalid');
                    if (state === 'valid') {
                        input.classList.add('is-valid');
                        if (hint) {
                            hint.textContent = msg || 'Correcto';
                            hint.className = 'form-text small live-reset-msg text-success';
                        }
                    } else if (state === 'invalid') {
                        input.classList.add('is-invalid');
                        if (hint) {
                            hint.textContent = msg || 'Revise este campo';
                            hint.className = 'form-text small live-reset-msg text-danger';
                        }
                    } else if (state === 'neutral') {
                        if (hint) {
                            hint.textContent = '';
                            hint.className = 'form-text small live-reset-msg';
                        }
                    }
                }

                function validarContrasena(input) {
                    var v = (input.value || '');
                    if (!v) {
                        setLive(input, 'neutral');
                        return false;
                    }
                    if (v.length < 8) {
                        setLive(input, 'invalid', 'Mínimo 8 caracteres.');
                        return false;
                    }
                    if (!/[A-Z]/.test(v)) {
                        setLive(input, 'invalid', 'Incluya una mayúscula.');
                        return false;
                    }
                    if (!/[0-9]/.test(v)) {
                        setLive(input, 'invalid', 'Incluya un número.');
                        return false;
                    }
                    if (!/[^a-zA-Z0-9\s]/.test(v)) {
                        setLive(input, 'invalid', 'Incluya un carácter especial (! @ # …).');
                        return false;
                    }
                    setLive(input, 'valid', 'Contraseña cumple los requisitos.');
                    return true;
                }

                function validarConfirmar() {
                    var c1 = document.getElementById('password');
                    var c2 = document.getElementById('confirmPassword');
                    if (!c1 || !c2) return false;
                    var v2 = (c2.value || '');
                    if (!v2) {
                        setLive(c2, 'neutral');
                        return false;
                    }
                    if (c1.value !== c2.value) {
                        setLive(c2, 'invalid', 'Las contraseñas no coinciden.');
                        return false;
                    }
                    setLive(c2, 'valid', 'Las contraseñas coinciden.');
                    return true;
                }

                function runLive(input) {
                    var kind = input.getAttribute('data-live-reset');
                    if (kind === 'contrasena') {
                        validarContrasena(input);
                        validarConfirmar();
                        return;
                    }
                    if (kind === 'confirmar') {
                        if (document.getElementById('password')) {
                            validarContrasena(document.getElementById('password'));
                        }
                        validarConfirmar();
                    }
                }

                function toggleEye(btn) {
                    var id = btn.getAttribute('data-toggle-for');
                    var input = document.getElementById(id);
                    if (!input) return;
                    if (input.type === 'password') {
                        input.type = 'text';
                        btn.classList.remove('fa-eye');
                        btn.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        btn.classList.remove('fa-eye-slash');
                        btn.classList.add('fa-eye');
                    }
                }

                document.querySelectorAll('[data-toggle-for]').forEach(function (btn) {
                    btn.addEventListener('click', function () { toggleEye(btn); });
                    btn.addEventListener('keydown', function (e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            toggleEye(btn);
                        }
                    });
                });

                document.querySelectorAll('[data-live-reset]').forEach(function (input) {
                    input.addEventListener('input', function () { runLive(input); });
                    input.addEventListener('blur', function () { runLive(input); });
                });

                var form = document.getElementById('formResetPassword');
                if (form) {
                    form.addEventListener('submit', function (e) {
                        var p1 = document.getElementById('password');
                        var p2 = document.getElementById('confirmPassword');
                        var ok1;
                        if (!p1.value.trim()) {
                            setLive(p1, 'invalid', MSG_POLITICA);
                            ok1 = false;
                        } else {
                            ok1 = validarContrasena(p1);
                        }
                        var ok2;
                        if (!p2.value.trim()) {
                            setLive(p2, 'invalid', 'Confirme la contraseña.');
                            ok2 = false;
                        } else if (p1.value !== p2.value) {
                            setLive(p2, 'invalid', 'Las contraseñas no coinciden.');
                            ok2 = false;
                        } else {
                            setLive(p2, 'valid', 'Las contraseñas coinciden.');
                            ok2 = true;
                        }
                        if (!ok1 || !ok2) {
                            e.preventDefault();
                            e.stopPropagation();
                        }
                    });
                }
            })();
        </script>
    </section>
</body>

</html>
