<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Nueva contraseña</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>

<body>
    <section layout:fragment="contenido"
        class="container-fluid min-vh-100 d-flex align-items-center justify-content-center login-container pt-5 pb-5 mt-2">
        <div class="card shadow p-5" style="max-width: 520px; width: 90%;">
            <div class="card-body">
                <h1 class="mb-3 text-center h3">Establecer nueva contraseña</h1>
                <p class="text-muted text-center small mb-4">
                    Introduce y confirma tu nueva contraseña.
                </p>
                <div class="alert alert-danger py-2 small" th:if="${errorForm}" th:text="${errorForm}"></div>
                <form th:action="@{/reset}" method="post" class="d-grid gap-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="token" th:value="${token}" />
                    <div>
                        <label for="password" class="form-label">Nueva contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                            autocomplete="new-password" minlength="6" required />
                    </div>
                    <div>
                        <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                            autocomplete="new-password" minlength="6" required />
                    </div>
                    <button type="submit" class="btn btn-dark">Guardar contraseña</button>
                    <a th:href="@{/login}" class="btn btn-outline-secondary">Volver al inicio de sesión</a>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
