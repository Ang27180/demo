# ===========================
spring.thymeleaf.cache=false

# ===========================
# ===========================
spring.application.name=cruz_ozzy

# Overrides locales opcionales (archivo ignorado por Git; ver application-local.properties.example)
spring.config.import=optional:classpath:application-local.properties

# ===========================
#  CONFIGURACIÓN DE BASE DE DATOS (Manejado por Railway en PROD)
# ===========================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sabormasterclass}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&disabledAuthenticationPlugins=auth_gssapi_client
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=${PORT:8080}

# Respuestas HTML / servlet UTF-8 (evita símbolos rotos en hosting)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force-response=true
server.servlet.encoding.force-request=true

# Thymeleaf / plantillas en UTF-8
spring.thymeleaf.encoding=UTF-8

# Sesión JDBC MySQL: charset de conexión (acentos en datos desde Render/Railway)
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
# Respeta @Column(name=...) tal cual (p. ej. rol.descripcionRol vs descripcion_rol; la estrategia camelCase→snake duplicaba columnas).
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
# MySQL anterior a 8 (p. ej. XAMPP antiguo): dialecto community. Con MySQL 8+ quita esta línea y la dependencia hibernate-community-dialects.
spring.jpa.database-platform=org.hibernate.community.dialect.MySQLLegacyDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
#  CORREO
#
#  Transporte:
#    • smtp (por defecto): Gmail u otro SMTP — útil en local.
#    • resend: API HTTPS (puerto 443). OBLIGATORIO en muchos hostings (p. ej. Render) que BLOQUEAN
#      la salida SMTP (puerto 587) → "Connect timed out" a smtp.gmail.com.
#      Cuenta gratis: https://resend.com — dominio verificado (ej. send.tudominio.com en DNS).
#      Variables Render: MAIL_TRANSPORT=resend, RESEND_API_KEY=re_...
#      MAIL_FROM: remitente @dominio-verificado (ej. noreply@send.sabormasterclass.com). Evita onboarding@resend.dev en prod.
#      MAIL_FROM_VERIFIED: fallback si MAIL_FROM cae en Gmail; por defecto noreply@send.sabormasterclass.com en este proyecto.
#      Si MAIL_FROM cae en Gmail por el fallback de spring.mail.username, se usa app.mail.from-verified-fallback.
#
#  Gmail (solo con app.mail.transport=smtp): contraseña de aplicación
#  https://support.google.com/accounts/answer/185833
#  Local: application-local.properties → spring.mail.password (sin subir a Git)
#  SMTP en servidor: MAIL_PASSWORD
#
#  Health: con Resend el indicador "mail" seguiría probando SMTP; si /actuator/health falla, define
#  MANAGEMENT_HEALTH_MAIL_ENABLED=false
# ===========================
app.mail.transport=${MAIL_TRANSPORT:smtp}
app.mail.from=${MAIL_FROM:${spring.mail.username}}
# Resend: si app.mail.from queda en un dominio público (p. ej. Gmail), usar este remitente (dominio verificado en Resend).
app.mail.from-verified-fallback=${MAIL_FROM_VERIFIED:Sabor MasterClass <noreply@send.sabormasterclass.com>}
# Opcional (Resend): buzón para "Responder a" (p. ej. tu Gmail), aunque MAIL_FROM sea @tudominio.com
app.mail.reply-to=${MAIL_REPLY_TO:}
resend.api.key=${RESEND_API_KEY:}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:sabormasterclass@gmail.com}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
# 587 + STARTTLS (por defecto). Si pruebas Gmail por 465: MAIL_PORT=465, MAIL_SMTP_SSL=true, MAIL_STARTTLS_ENABLE=false
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL:false}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:true}

# URL pública https de la app (Render: APP_PUBLIC_URL). Usada en todos los enlaces de correos (pago, certificado, reset, etc.).
app.public-url=${APP_PUBLIC_URL:http://localhost:8080}

# Subida de archivos (imágenes QR de medios de pago)
app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# PUT/DELETE desde formularios HTML (multipart en edición de medios de pago)
spring.mvc.hiddenmethod.filter.enabled=true

# Plazo para pagar inscripciones PENDIENTE_PAGO (días desde la fecha de inscripción)
app.inscripcion.dias-plazo-pago=7
# Cron diario medianoche para cancelar vencidas (segundo minuto hora día mes día-semana)
app.inscripcion.vencimiento-cron=0 0 0 * * ?
# Órdenes Nequi: marcar VENCIDO si la fecha de vencimiento pasó (minuto 5 de cada día)
app.pago.orden-vencimiento-cron=0 5 0 * * ?
