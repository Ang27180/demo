# ===========================
spring.thymeleaf.cache=false

# ===========================
# ===========================
spring.application.name=cruz_ozzy

# Overrides locales opcionales (archivo ignorado por Git; ver application-local.properties.example)
spring.config.import=optional:classpath:application-local.properties

# ===========================
#  CONFIGURACIÓN DE BASE DE DATOS (Manejado por Railway en PROD)
# ===========================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sabormasterclass}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&disabledAuthenticationPlugins=auth_gssapi_client
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
# Respeta @Column(name=...) tal cual (p. ej. rol.descripcionRol vs descripcion_rol; la estrategia camelCase→snake duplicaba columnas).
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
# MySQL anterior a 8 (p. ej. XAMPP antiguo): dialecto community. Con MySQL 8+ quita esta línea y la dependencia hibernate-community-dialects.
spring.jpa.database-platform=org.hibernate.community.dialect.MySQLLegacyDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
#  CONFIGURACIÓN DE CORREO — Gmail SMTP (JavaMailSender)
#
#  En Gmail: activa verificación en 2 pasos y crea una "Contraseña de aplicación"
#  (no uses la contraseña normal de la cuenta).
#  https://support.google.com/accounts/answer/185833
#
#  Usuario: MAIL_USERNAME o valor por defecto abajo.
#  Contraseña: NO definir spring.mail.password aquí (evita anular el archivo local con valor vacío).
#    → Local: src/main/resources/application-local.properties → spring.mail.password=... (16 chars, sin espacios)
#    → Servidor: variable de entorno MAIL_PASSWORD (Spring la enlaza sola; no la dejes vacía)
#
#  Otro SMTP: sobrescribe en application-local.properties (p. ej. spring.mail.host=...)
#  Depuración SMTP (solo pruebas): MAIL_DEBUG=true o application-local.properties (ejemplo en repo)
#  Si el "De:" debe ser distinto del usuario (poco habitual en Gmail): spring.mail.from=
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:sabormasterclass@gmail.com}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# URL pública de la app (enlaces en correos, p. ej. recuperación de contraseña)
app.public-url=${APP_PUBLIC_URL:http://localhost:8080}

# Subida de archivos (imágenes QR de medios de pago)
app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# PUT/DELETE desde formularios HTML (multipart en edición de medios de pago)
spring.mvc.hiddenmethod.filter.enabled=true

# Plazo para pagar inscripciones PENDIENTE_PAGO (días desde la fecha de inscripción)
app.inscripcion.dias-plazo-pago=7
# Cron diario medianoche para cancelar vencidas (segundo minuto hora día mes día-semana)
app.inscripcion.vencimiento-cron=0 0 0 * * ?
# Órdenes Nequi: marcar VENCIDO si la fecha de vencimiento pasó (minuto 5 de cada día)
app.pago.orden-vencimiento-cron=0 5 0 * * ?
