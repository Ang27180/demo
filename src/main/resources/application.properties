# ===========================
spring.thymeleaf.cache=false

# ===========================
# ===========================
spring.application.name=cruz_ozzy

# ===========================
#  CONFIGURACIÓN DE BASE DE DATOS (Manejado por Railway en PROD)
# ===========================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sabormasterclass}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&disabledAuthenticationPlugins=auth_gssapi_client
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# MySQL anterior a 8 (p. ej. XAMPP antiguo): dialecto community. Con MySQL 8+ quita esta línea y la dependencia hibernate-community-dialects.
spring.jpa.database-platform=org.hibernate.community.dialect.MySQLLegacyDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
#  CONFIGURACIÓN DE CORREO (SMTP)
#  MAIL_USERNAME y MAIL_PASSWORD deben definirse en el entorno (no commitear secretos)
# ===========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Subida de archivos (imágenes QR de medios de pago)
app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=5MB

# PUT/DELETE desde formularios HTML (multipart en edición de medios de pago)
spring.mvc.hiddenmethod.filter.enabled=true

# Plazo para pagar inscripciones PENDIENTE_PAGO (días desde la fecha de inscripción)
app.inscripcion.dias-plazo-pago=7
# Cron diario medianoche para cancelar vencidas (segundo minuto hora día mes día-semana)
app.inscripcion.vencimiento-cron=0 0 0 * * ?
