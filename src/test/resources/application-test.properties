# Evita ejecutar schema.sql (MySQL) en tests.
spring.sql.init.mode=never

# Perfil "test": BD en memoria para levantar el contexto sin MySQL (p. ej. EmailServiceEnvioTextoIT).
spring.datasource.url=jdbc:h2:mem:demotest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
# H2: no ejecutar SET NAMES de MySQL del application.properties principal
spring.datasource.hikari.connection-init-sql=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JavaMailSender: sin host/usuario Boot puede no crear el bean; placeholders solo para levantar el contexto en test.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:placeholder-not-for-real-send@example.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
