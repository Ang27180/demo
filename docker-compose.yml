services:
  mysql:
    image: mysql:8
    container_name: mysql-sabormasterclass
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sabormasterclass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sabormasterclass:latest
    container_name: app-sabormasterclass
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sabormasterclass?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  mysql_data:
