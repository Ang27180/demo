spring.application.name=cruz_ozzy

# ===========================
#  CONFIGURACIÓN DE BASE DE DATOS
# ===========================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/sabormasterclass?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&disabledAuthenticationPlugins=auth_gssapi_client
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
# CORRECCIÓN: Cambiado de 'update' a 'none' para que Hibernate NO intente
# modificar las tablas existentes en MySQL (causa SQLSyntaxErrorException).
# Las tablas ya existen con la estructura correcta en la BD.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# THYMELEAF
spring.thymeleaf.cache=false

# DIAGNÓSTICO TEMPORAL: Muestra el error completo en el navegador
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true
server.error.include-binding-errors=always

