<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo">Inscripción al Curso - Sabor MasterClass</title>
    <link rel="stylesheet" th:href="@{/css/inscripcion.css}">
</head>

<body>
    <main layout:fragment="contenido" class="d-flex align-items-center justify-content-center" 
          style="min-height: 80vh; background-color: #000; padding-top: 100px;">
        
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-6 col-lg-5">
                    
                    <form th:action="@{/inscripciones/guardar}" method="post">
                        <!-- ID Estudiante -->
                        <input type="hidden" name="idEstudiante" th:value="${idEstudiante}">

                        <div class="inscripcion-card p-5 shadow-lg border-0">
                            <div class="text-center mb-5">
                                <div class="bg-yellow-light rounded-circle d-inline-flex p-3 mb-3">
                                    <i class="fas fa-graduation-cap fa-2x text-yellow"></i>
                                </div>
                                <h1 class="h3 fw-bold text-white mb-2">Registrar Inscripción</h1>
                                <p class="text-white-50 small mb-0">Comienza tu viaje gastronómico hoy mismo</p>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-white-50 fw-bold small text-uppercase mb-2 tracking-wider">
                                    Curso a Inscribir
                                </label>
                                <div class="custom-select-wrapper">
                                    <select name="idCurso" class="custom-select-dark w-100" required>
                                        <option value="" th:if="${idCurso == null}">Seleccione un curso</option>
                                        <option th:each="curso : ${listaCursos}" 
                                                th:value="${curso.id}" 
                                                th:text="${curso.nombre}"
                                                th:selected="${idCurso == curso.id or #lists.size(listaCursos) == 1}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-3 mt-5">
                                <button type="submit" class="btn btn-yellow-action btn-lg py-3 fw-bold shadow-yellow">
                                    <i class="fas fa-check-circle me-2"></i> Confirmar Inscripción
                                </button>
                                <a th:href="@{/cursos}" class="btn btn-dark-outline btn-sm py-2">
                                    <i class="fas fa-arrow-left me-2"></i> Cancelar y volver
                                </a>
                            </div>

                            <div class="mt-4 pt-4 border-top border-secondary opacity-25">
                                <div class="d-flex align-items-center justify-content-between text-white-50 small">
                                    <span>Acceso inmediato</span>
                                    <i class="fas fa-bolt text-yellow"></i>
                                </div>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>

    </main>
</body>

</html>
